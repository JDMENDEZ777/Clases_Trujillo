<div class="pokedex-container">
  <h1>{{ title() }}</h1>

  <div *ngIf="cargando()" class="loading">
    <p>Cargando pokémons...</p>
  </div>

  <div *ngIf="!cargando()" class="pokemon-grid">
    @for (pokemon of pokemons(); track pokemon.name) {
      <div class="pokemon-card">
        <img [src]="pokemon.image" [alt]="pokemon.name" class="pokemon-image" />
        <h3>{{ pokemon.name }}</h3>
      </div>
    }
  </div>
</div>

<style>
  .pokedex-container {
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
    font-family: 'Arial', sans-serif;
  }

  h1 {
    text-align: center;
    color: #cc0000;
    font-size: 2.5rem;
    margin-bottom: 2rem;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
  }

  .loading {
    text-align: center;
    padding: 2rem;
    font-size: 1.2rem;
    color: #333;
  }

  .pokemon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 2rem;
    padding: 1rem;
  }

  .pokemon-card {
    background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  .pokemon-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
  }

  .pokemon-image {
    width: 150px;
    height: 150px;
    object-fit: contain;
    margin-bottom: 1rem;
    background: white;
    border-radius: 8px;
    padding: 10px;
  }

  .pokemon-card h3 {
    color: #fff;
    font-size: 1.2rem;
    margin: 0;
    text-transform: capitalize;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
  }

  @media (max-width: 768px) {
    .pokemon-grid {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }

    h1 {
      font-size: 2rem;
    }
  }
</style>

<router-outlet />
